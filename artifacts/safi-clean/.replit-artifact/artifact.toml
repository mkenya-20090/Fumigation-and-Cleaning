kind = "web"
previewPath = "/"
title = "Safi Clean & Fumigation"
version = "1.0.0"
id = "artifacts/safi-clean"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22803

[services.development]
run = "pnpm --filter @workspace/safi-clean run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safi-clean", "run", "build" ]
publicDir = "artifacts/safi-clean/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22803"
BASE_PATH = "/"
